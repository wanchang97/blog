# 自动化部署 Hugo 到 GitHub Pages 的脚本
name: deploy

on:
  push:
    branches:
      - main  # 如果你的默认分支名是 master，请改为 master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true  # 这一行非常重要，用于拉取你的主题插件
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true # 支持某些主题需要的 Sass/SCSS 编译

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Translate every Chinese post that is missing `*.en.md` or has a stale
      # `source_hash`. Do NOT use only `git diff` for this: a push that only
      # touches workflow/config would skip all posts and leave English missing.
      # Do not use `if: secrets.*` — GitHub may reject it. Check in shell instead.
      - name: Auto translate posts (zh -> en)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "GEMINI_API_KEY not set in repo Secrets; skipping translation."
            exit 0
          fi
          python scripts/translate_posts.py

      - name: Build
        run: hugo --gc --minify --environment production

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public # Hugo 生成的静态文件存放目录